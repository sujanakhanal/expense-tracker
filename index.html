<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="left-part">
          <p id="expense-tracker">Expense Tracker</p>
          <p id="manage-finance">Manage your finance with ease</p>
        </div>
        <div class="right-part">
          <i class="fa-regular fa-moon"></i>
        </div>
      </div>
    </header>

    <main>
      <section class="first-section">
        <div class="total-balance">
          <div class="balance-wallet">
            <span>Total balance</span>
            <div class="wallet-icon">
              <i class="fa-regular fa-credit-card"></i>
            </div>
          </div>
          <p id="balance-amount">$0.00</p>
        </div>

        <div class="total-income">
          <div class="income-wallet">
            <span>Total Income</span>
            <div class="right-arrow">
              <i class="fa-solid fa-arrow-trend-up"></i>
            </div>
          </div>
          <p id="income-amount">$0.00</p>
        </div>

        <div class="total-expense">
          <div class="expense-wallet">
            <span>Total Expense</span>
            <div class="left-arrow">
              <i class="fa-solid fa-arrow-trend-down"></i>
            </div>
          </div>
          <p id="expense-amount">$0.00</p>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
