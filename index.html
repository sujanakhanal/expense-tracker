<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="navleft-part">
          <p id="expense-tracker">Expense Tracker</p>
          <p id="manage-finance">Manage your finance with ease</p>
        </div>
        <div class="navright-part">
          <i class="fa-regular fa-moon"></i>
        </div>
      </div>
    </header>

    <main>
      <section class="first-section">
        <div class="total-balance">
          <div class="balance-wallet">
            <span>Total balance</span>
            <div class="wallet-icon">
              <i class="fa-regular fa-credit-card"></i>
            </div>
          </div>
          <p id="balance-amount">Rs 0.00</p>
        </div>

        <div class="total-income">
          <div class="income-wallet">
            <span>Total Income</span>
            <div class="right-arrow">
              <i class="fa-solid fa-arrow-trend-up"></i>
            </div>
          </div>
          <p id="income-amount">Rs 0.00</p>
        </div>

        <div class="total-expense">
          <div class="expense-wallet">
            <span>Total Expense</span>
            <div class="left-arrow">
              <i class="fa-solid fa-arrow-trend-down"></i>
            </div>
          </div>
          <p id="expense-amount">Rs 0.00</p>
        </div>
      </section>
      <section class="second-section">
        <div class="left-part">
          <h2>Add Transaction</h2>
          <div class="buttons">
            <button id="income-btn">Income</button>
            <button id="expense-btn">Expense</button>
          </div>
          <div class="amount">
            <p>Amount</p>
            <input id="amount-input" type="text" placeholder="0.00" />
          </div>

          <div class="category">
            <p>Category</p>

            <div class="custom-select" id="category-select">
              <div class="selected" id="selected-category">Select category</div>
              <div class="options" id="category-options"></div>
            </div>
          </div>

          <div class="description">
            <p>Description</p>
            <input
              id="description-input"
              type="text"
              placeholder="Enter Description..."
            />
          </div>
          <div class="date">
            <p>Date</p>
            <input id="date-input" type="text" placeholder="mm/dd/yyyy" />
            <span class="calendar-icon">📅</span>
          </div>

          <div class="add-btn">
            <button id="add-transaction-btn">+ Add</button>
            <button id="cancel-edit-btn" style="display: none">Cancel</button>
          </div>
        </div>
        <div class="right-part">
          <section class="first-right-section">
            <div class="barchart">
              <h2>Monthly Spending Trend</h2>
              <canvas id="spendingChart"></canvas>
            </div>
          </section>
          <section class="second-right-section">
            <div class="filters">
              <h3>Filters</h3>
            </div>
            <div class="category">
              <p>Category</p>
              <input type="text" placeholder="All Category" />
            </div>
            <div class="dates">
              <div class="start-date">
                <p>Start Date</p>
                <input type="text" placeholder="mm/dd/yy" />
              </div>
              <div class="end-date">
                <p>End Date</p>
                <input type="text" placeholder="mm/dd/yy" />
              </div>
            </div>
            <div class="reset-btn">
              <button>Reset Filters</button>
            </div>
          </section>

          <section class="third-right-section">
            <div id="transaction-list"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
    <script src="chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </body>
</html>
